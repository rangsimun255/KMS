<!DOCTYPE html>
<html lang="th">
<head>
  <script>
    (function () {
      const user =
        localStorage.getItem('kmsUser') ||
        sessionStorage.getItem('kmsUser') ||
        localStorage.getItem('currentUser') ||
        sessionStorage.getItem('currentUser');

      if (!user) {
        window.location.replace('login.html');
      }
    })();
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KMS - Quiz Play</title>

  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root{
      --bg:#f6f8fc;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#e5e7eb;
      --red:#e21b3c;
      --blue:#1368ce;
      --yellow:#d89e00;
      --green:#26890c;
      --purple:#7b2cbf;
      --header1:#4A89C8;
      --header2:#2E75B6;
      --shadow:0 12px 30px rgba(15,23,42,.08);
      --radius:24px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body{
      font-family:'Sarabun',sans-serif;
      background:linear-gradient(180deg,#eef5fc 0%, #f7f9fc 100%);
      min-height:100vh;
      color:#2E3A59;
      font-size:14px;
      line-height:1.7;
    }

    .container{
      display:flex;
      min-height:100vh;
    }

    .sidebar{
      width:70px;
      background:linear-gradient(180deg,var(--header1) 0%,var(--header2) 100%);
      display:flex;
      flex-direction:column;
      align-items:center;
      padding-top:20px;
      gap:10px;
      position:fixed;
      height:100vh;
      z-index:10;
      box-shadow:4px 0 18px rgba(46,117,182,.15);
    }

    .sidebar-icon{
      width:50px;
      height:50px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:rgba(255,255,255,.85);
      font-size:20px;
      border-radius:12px;
      cursor:pointer;
      transition:all .3s ease;
      text-decoration:none;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }

    .sidebar-icon:hover,
    .sidebar-icon.active{
      background-color:rgba(255,255,255,.18);
      color:#fff;
    }

    .sidebar-icon:active{ transform:scale(.96); }

    .main-content{
      flex:1;
      padding:0;
      margin-left:70px;
    }

    .header{
      background:linear-gradient(135deg,var(--header1) 0%,var(--header2) 100%);
      padding:52px 40px 58px 40px;
      min-height:220px;
      text-align:center;
      box-shadow:0 4px 15px rgba(74,137,200,.25);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      position:relative;
      overflow:hidden;
    }

    .header::after{
      content:"";
      position:absolute;
      inset:auto -120px -120px auto;
      width:320px;
      height:320px;
      background:rgba(255,255,255,.08);
      border-radius:50%;
    }

    .header::before{
      content:"";
      position:absolute;
      inset:-120px auto auto -120px;
      width:260px;
      height:260px;
      background:rgba(255,255,255,.06);
      border-radius:50%;
    }

    .header h1{
      font-size:42px;
      font-weight:800;
      color:#ffffff;
      margin-bottom:10px;
      letter-spacing:.5px;
      text-shadow:0 2px 4px rgba(0,0,0,.18);
      position:relative;
      z-index:1;
    }

    .header .subtitle{
      font-size:18px;
      color:rgba(255,255,255,.95);
      max-width:760px;
      margin:0 auto;
      line-height:1.7;
      position:relative;
      z-index:1;
    }

    .page{
      min-height:calc(100vh - 220px);
      padding:24px 32px 30px 32px;
      margin-top:-26px;
      position:relative;
      z-index:2;
    }

    .topbar{
      max-width:1220px;
      margin:0 auto 18px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .back-btn,.next-btn,.restart-btn,.review-btn,.return-btn{
      border:none;
      border-radius:999px;
      padding:14px 20px;
      font-weight:800;
      cursor:pointer;
      font-size:16px;
      font-family:'Sarabun',sans-serif;
    }

    .back-btn{
      background:#fff;
      color:var(--text);
      box-shadow:var(--shadow);
    }

    .next-btn,.restart-btn,.review-btn,.return-btn{
      color:#fff;
    }

    .next-btn,.restart-btn{
      background:var(--purple);
    }

    .review-btn{
      background:var(--blue);
    }

    .return-btn{
      background:#64748b;
    }

    .next-btn[disabled]{
      opacity:.4;
      cursor:not-allowed;
    }

    .user-chip{
      background:#fff;
      border-radius:999px;
      padding:10px 14px;
      box-shadow:var(--shadow);
      color:var(--muted);
      font-weight:700;
    }

    .summary-strip{
      max-width:1220px;
      margin:0 auto 18px;
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:14px;
    }

    .summary-pill{
      background:rgba(255,255,255,.82);
      backdrop-filter: blur(8px);
      border:1px solid rgba(255,255,255,.7);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:14px 18px;
      min-height:84px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .summary-pill .label{
      color:var(--muted);
      font-size:13px;
      font-weight:700;
      margin-bottom:4px;
    }

    .summary-pill .value{
      color:#1f2937;
      font-size:22px;
      font-weight:800;
      line-height:1.2;
    }

    .layout{
      max-width:1220px;
      margin:0 auto;
      display:grid;
      grid-template-columns:minmax(0, 1fr) 360px;
      gap:20px;
      align-items:start;
    }

    .layout.quiz-active{
      grid-template-columns:minmax(0, 860px);
      justify-content:center;
    }

    .card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:26px;
      border:1px solid rgba(15,23,42,.04);
    }

    .quiz-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .quiz-title-wrap h1{
      margin:0;
      font-size:28px;
      color:#1f2937;
    }

    .quiz-meta{
      color:var(--muted);
      font-weight:700;
      margin-top:6px;
    }

    .progress-wrap{margin-bottom:22px}

    .progress-label{
      display:flex;
      justify-content:space-between;
      font-size:14px;
      color:var(--muted);
      margin-bottom:8px;
      font-weight:700;
    }

    .progress-bar{
      height:14px;
      background:#edf2f7;
      border-radius:999px;
      overflow:hidden;
    }

    .progress-bar-fill{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#60a5fa 0%,#8b5cf6 100%);
      transition:width .25s ease;
    }

    .question-number{
      display:inline-block;
      padding:8px 14px;
      border-radius:999px;
      background:#eef2ff;
      color:#4338ca;
      font-weight:800;
      margin-bottom:14px;
    }

    .question-text{
      font-size:28px;
      line-height:1.35;
      font-weight:800;
      margin:0 0 18px;
      color:#1f2937;
    }

    .question-image{
      display:none;
      width:100%;
      max-height:380px;
      object-fit:contain;
      border-radius:22px;
      background:#f8fafc;
      border:1px solid var(--line);
      padding:12px;
      margin-bottom:18px;
    }

    .choices{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .choice{
      border:none;
      border-radius:22px;
      min-height:92px;
      color:#fff;
      font-size:20px;
      font-weight:800;
      text-align:left;
      padding:16px 18px;
      cursor:pointer;
      transition:transform .12s ease, opacity .2s ease, box-shadow .2s ease, background .2s ease;
      display:flex;
      align-items:center;
      gap:14px;
      box-shadow:0 10px 20px rgba(15,23,42,.1);
      font-family:'Sarabun',sans-serif;
    }

    .choice:hover{ transform:translateY(-2px); }
    .choice:disabled{ cursor:default; }
    .choice.dim{ opacity:.45; }

    .choice.correct-ring{
      border:4px solid #16a34a;
      background:#16a34a !important;
      box-shadow:
        0 0 0 6px #22c55e,
        0 0 0 14px rgba(34,197,94,.28),
        0 14px 28px rgba(15,23,42,.16);
      transform:scale(1.01);
    }

    .choice.correct-ring .shape{
      background:rgba(255,255,255,.22);
      border:2px solid rgba(255,255,255,.35);
    }

    .choice.wrong-ring{
      border:4px solid #dc2626;
      background:#ef4444 !important;
      box-shadow:
        0 0 0 6px #f87171,
        0 0 0 14px rgba(239,68,68,.22),
        0 14px 28px rgba(15,23,42,.16);
    }

    .shape{
      width:42px;
      height:42px;
      flex:0 0 42px;
      border-radius:12px;
      display:grid;
      place-items:center;
      background:rgba(255,255,255,.18);
      font-size:22px;
    }

    .choice.a{ background:var(--red); }
    .choice.b{ background:var(--blue); }
    .choice.c{ background:var(--yellow); }
    .choice.d{ background:var(--green); }

    .action-row{
      margin-top:18px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .feedback{
      min-height:24px;
      font-weight:800;
      padding:10px 14px;
      border-radius:14px;
    }

    .feedback.correct{
      color:#166534;
      background:#dcfce7;
      border:1px solid #86efac;
    }

    .feedback.wrong{
      color:#991b1b;
      background:#fee2e2;
      border:1px solid #fca5a5;
    }

    .side-title{
      margin:0 0 14px;
      font-size:22px;
      color:#1f2937;
    }

    .score-box{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
      margin-bottom:18px;
    }

    .stat{
      background:#f8fafc;
      border:1px solid var(--line);
      border-radius:20px;
      padding:16px;
      text-align:center;
    }

    .stat-label{
      color:var(--muted);
      font-size:13px;
      font-weight:700;
      margin-bottom:6px;
    }

    .stat-value{
      font-size:30px;
      font-weight:900;
      color:#1f2937;
    }

    .report-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      max-height:520px;
      overflow:auto;
      padding-right:4px;
    }

    .report-item{
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      background:#fff;
    }

    .report-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:8px;
    }

    .report-q{ font-weight:800; }

    .badge{
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      font-weight:800;
      color:#fff;
    }

    .badge.correct{ background:var(--green); }
    .badge.wrong{ background:var(--red); }
    .badge.level{
      display:inline-block;
      margin-top:14px;
      padding:8px 14px;
      font-size:14px;
    }

    .report-answer{
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
    }

    .loading-state,.error-state,.done-state,.empty-state{
      text-align:center;
      padding:40px 20px;
    }

    .done-title{
      font-size:34px;
      margin:0 0 12px;
      color:#1f2937;
    }

    .done-name{
      font-size:18px;
      color:#475569;
      margin-bottom:12px;
      font-weight:700;
    }

    .done-score{
      font-size:50px;
      font-weight:900;
      color:var(--purple);
      margin:10px 0 8px;
    }

    .done-percent{
      font-size:20px;
      font-weight:800;
      margin-bottom:8px;
      color:#1f2937;
    }

    .done-message{
      max-width:560px;
      margin:8px auto 20px;
      color:#64748b;
      font-size:17px;
      line-height:1.7;
    }

    .done-actions{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .footer{
      text-align:center;
      padding:15px 40px;
      color:#8A98AD;
      font-size:13px;
    }

    #reportSection.hidden{
      display:none;
    }

    @media (max-width:1100px){
      .summary-strip{
        grid-template-columns:1fr;
      }

      .layout,
      .layout.quiz-active{
        grid-template-columns:1fr;
      }
    }
