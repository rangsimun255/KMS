<!DOCTYPE html>
<html lang="th">
<head>
  <script>
    (function () {
      const user =
        localStorage.getItem('kmsUser') ||
        sessionStorage.getItem('kmsUser') ||
        localStorage.getItem('currentUser') ||
        sessionStorage.getItem('currentUser');

      if (!user) {
        window.location.replace('login.html');
      }
    })();
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KMS - Quiz Play</title>

  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root{
      --bg:#f6f8fc;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#e5e7eb;
      --red:#e21b3c;
      --blue:#1368ce;
      --yellow:#d89e00;
      --green:#26890c;
      --purple:#7b2cbf;
      --header1:#4A89C8;
      --header2:#2E75B6;
      --shadow:0 12px 30px rgba(15,23,42,.08);
      --radius:24px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body{
      font-family:'Sarabun',sans-serif;
      background:linear-gradient(180deg,#eef5fc 0%, #f7f9fc 100%);
      min-height:100vh;
      color:#2E3A59;
      font-size:14px;
      line-height:1.7;
    }

    .container{
      display:flex;
      min-height:100vh;
    }

    .sidebar{
      width:70px;
      background:linear-gradient(180deg,var(--header1) 0%,var(--header2) 100%);
      display:flex;
      flex-direction:column;
      align-items:center;
      padding-top:20px;
      gap:10px;
      position:fixed;
      height:100vh;
      z-index:10;
      box-shadow:4px 0 18px rgba(46,117,182,.15);
    }

    .sidebar-icon{
      width:50px;
      height:50px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:rgba(255,255,255,.85);
      font-size:20px;
      border-radius:12px;
      cursor:pointer;
      transition:all .3s ease;
      text-decoration:none;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }

    .sidebar-icon:hover,
    .sidebar-icon.active{
      background-color:rgba(255,255,255,.18);
      color:#fff;
    }

    .sidebar-icon:active{ transform:scale(.96); }

    .main-content{
      flex:1;
      padding:0;
      margin-left:70px;
    }

    .header{
      background:linear-gradient(135deg,var(--header1) 0%,var(--header2) 100%);
      padding:52px 40px 58px 40px;
      min-height:220px;
      text-align:center;
      box-shadow:0 4px 15px rgba(74,137,200,.25);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      position:relative;
      overflow:hidden;
    }

    .header::after{
      content:"";
      position:absolute;
      inset:auto -120px -120px auto;
      width:320px;
      height:320px;
      background:rgba(255,255,255,.08);
      border-radius:50%;
    }

    .header::before{
      content:"";
      position:absolute;
      inset:-120px auto auto -120px;
      width:260px;
      height:260px;
      background:rgba(255,255,255,.06);
      border-radius:50%;
    }

    .header h1{
      font-size:42px;
      font-weight:800;
      color:#ffffff;
      margin-bottom:10px;
      letter-spacing:.5px;
      text-shadow:0 2px 4px rgba(0,0,0,.18);
      position:relative;
      z-index:1;
    }

    .header .subtitle{
      font-size:18px;
      color:rgba(255,255,255,.95);
      max-width:760px;
      margin:0 auto;
      line-height:1.7;
      position:relative;
      z-index:1;
    }

    .page{
      min-height:calc(100vh - 220px);
      padding:24px 32px 30px 32px;
      margin-top:-26px;
      position:relative;
      z-index:2;
    }

    .topbar{
      max-width:1220px;
      margin:0 auto 18px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .back-btn,.next-btn,.restart-btn,.review-btn,.return-btn{
      border:none;
      border-radius:999px;
      padding:14px 20px;
      font-weight:800;
      cursor:pointer;
      font-size:16px;
      font-family:'Sarabun',sans-serif;
    }

    .back-btn{
      background:#fff;
      color:var(--text);
      box-shadow:var(--shadow);
    }

    .next-btn,.restart-btn,.review-btn,.return-btn{
      color:#fff;
    }

    .next-btn,.restart-btn{
      background:var(--purple);
    }

    .review-btn{
      background:var(--blue);
    }

    .return-btn{
      background:#64748b;
    }

    .next-btn[disabled]{
      opacity:.4;
      cursor:not-allowed;
    }

    .user-chip{
      background:#fff;
      border-radius:999px;
      padding:10px 14px;
      box-shadow:var(--shadow);
      color:var(--muted);
      font-weight:700;
    }

    .summary-strip{
      max-width:1220px;
      margin:0 auto 18px;
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:14px;
    }

    .summary-pill{
      background:rgba(255,255,255,.82);
      backdrop-filter: blur(8px);
      border:1px solid rgba(255,255,255,.7);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:14px 18px;
      min-height:84px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .summary-pill .label{
      color:var(--muted);
      font-size:13px;
      font-weight:700;
      margin-bottom:4px;
    }

    .summary-pill .value{
      color:#1f2937;
      font-size:22px;
      font-weight:800;
      line-height:1.2;
    }

    .layout{
      max-width:1220px;
      margin:0 auto;
      display:grid;
      grid-template-columns:minmax(0, 1fr) 360px;
      gap:20px;
      align-items:start;
    }

    .layout.quiz-active{
      grid-template-columns:minmax(0, 860px);
      justify-content:center;
    }

    .card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:26px;
      border:1px solid rgba(15,23,42,.04);
    }

    .quiz-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .quiz-title-wrap h1{
      margin:0;
      font-size:28px;
      color:#1f2937;
    }

    .quiz-meta{
      color:var(--muted);
      font-weight:700;
      margin-top:6px;
    }

    .progress-wrap{margin-bottom:22px}

    .progress-label{
      display:flex;
      justify-content:space-between;
      font-size:14px;
      color:var(--muted);
      margin-bottom:8px;
      font-weight:700;
    }

    .progress-bar{
      height:14px;
      background:#edf2f7;
      border-radius:999px;
      overflow:hidden;
    }

    .progress-bar-fill{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#60a5fa 0%,#8b5cf6 100%);
      transition:width .25s ease;
    }

    .question-number{
      display:inline-block;
      padding:8px 14px;
      border-radius:999px;
      background:#eef2ff;
      color:#4338ca;
      font-weight:800;
      margin-bottom:14px;
    }

    .question-text{
      font-size:28px;
      line-height:1.35;
      font-weight:800;
      margin:0 0 18px;
      color:#1f2937;
    }

    .question-image{
      display:none;
      width:100%;
      max-height:380px;
      object-fit:contain;
      border-radius:22px;
      background:#f8fafc;
      border:1px solid var(--line);
      padding:12px;
      margin-bottom:18px;
    }

    .choices{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .choice{
      border:none;
      border-radius:22px;
      min-height:92px;
      color:#fff;
      font-size:20px;
      font-weight:800;
      text-align:left;
      padding:16px 18px;
      cursor:pointer;
      transition:transform .12s ease, opacity .2s ease, box-shadow .2s ease;
      display:flex;
      align-items:center;
      gap:14px;
      box-shadow:0 10px 20px rgba(15,23,42,.1);
      font-family:'Sarabun',sans-serif;
    }

    .choice:hover{ transform:translateY(-2px); }
    .choice:disabled{ cursor:default; }
    .choice.dim{ opacity:.45; }

    .choice.correct-ring{
      border:3px solid #16a34a;
      box-shadow:
        0 0 0 6px #22c55e,
        0 0 0 12px rgba(34,197,94,.22),
        0 12px 24px rgba(15,23,42,.12);
      transform:scale(1.01);
    }

    .choice.wrong-ring{
      border:3px solid #dc2626;
      box-shadow:
        0 0 0 6px #ef4444,
        0 0 0 12px rgba(239,68,68,.18),
        0 12px 24px rgba(15,23,42,.12);
    }

    .shape{
      width:42px;
      height:42px;
      flex:0 0 42px;
      border-radius:12px;
      display:grid;
      place-items:center;
      background:rgba(255,255,255,.18);
      font-size:22px;
    }

    .choice.a{ background:var(--red); }
    .choice.b{ background:var(--blue); }
    .choice.c{ background:var(--yellow); }
    .choice.d{ background:var(--green); }

    .action-row{
      margin-top:18px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .feedback{
      min-height:24px;
      font-weight:800;
      padding:10px 14px;
      border-radius:14px;
    }

    .feedback.correct{
      color:#166534;
      background:#dcfce7;
      border:1px solid #86efac;
    }

    .feedback.wrong{
      color:#991b1b;
      background:#fee2e2;
      border:1px solid #fca5a5;
    }

    .side-title{
      margin:0 0 14px;
      font-size:22px;
      color:#1f2937;
    }

    .score-box{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
      margin-bottom:18px;
    }

    .stat{
      background:#f8fafc;
      border:1px solid var(--line);
      border-radius:20px;
      padding:16px;
      text-align:center;
    }

    .stat-label{
      color:var(--muted);
      font-size:13px;
      font-weight:700;
      margin-bottom:6px;
    }

    .stat-value{
      font-size:30px;
      font-weight:900;
      color:#1f2937;
    }

    .report-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      max-height:520px;
      overflow:auto;
      padding-right:4px;
    }

    .report-item{
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      background:#fff;
    }

    .report-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:8px;
    }

    .report-q{ font-weight:800; }

    .badge{
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      font-weight:800;
      color:#fff;
    }

    .badge.correct{ background:var(--green); }
    .badge.wrong{ background:var(--red); }
    .badge.level{
      display:inline-block;
      margin-top:14px;
      padding:8px 14px;
      font-size:14px;
    }

    .report-answer{
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
    }

    .loading-state,.error-state,.done-state,.empty-state{
      text-align:center;
      padding:40px 20px;
    }

    .done-title{
      font-size:34px;
      margin:0 0 12px;
      color:#1f2937;
    }

    .done-name{
      font-size:18px;
      color:#475569;
      margin-bottom:12px;
      font-weight:700;
    }

    .done-score{
      font-size:50px;
      font-weight:900;
      color:var(--purple);
      margin:10px 0 8px;
    }

    .done-percent{
      font-size:20px;
      font-weight:800;
      margin-bottom:8px;
      color:#1f2937;
    }

    .done-message{
      max-width:560px;
      margin:8px auto 20px;
      color:#64748b;
      font-size:17px;
      line-height:1.7;
    }

    .done-actions{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .footer{
      text-align:center;
      padding:15px 40px;
      color:#8A98AD;
      font-size:13px;
    }

    #reportSection.hidden{
      display:none;
    }

    @media (max-width:1100px){
      .summary-strip{
        grid-template-columns:1fr;
      }

      .layout,
      .layout.quiz-active{
        grid-template-columns:1fr;
      }
    }

    @media (max-width:768px){
      .container{ flex-direction:column; }

      .sidebar{
        width:100%;
        height:60px;
        flex-direction:row;
        justify-content:center;
        padding:10px;
        position:fixed;
        top:0;
        left:0;
        z-index:1000;
      }

      .main-content{
        margin-left:0;
        margin-top:60px;
      }

      .header{
        padding:40px 20px;
        min-height:170px;
      }

      .header h1{ font-size:28px; }
      .header .subtitle{ font-size:15px; }

      .page{ padding:18px; }
    }

    @media (max-width:640px){
      .card{ padding:18px; }
      .question-text{ font-size:22px; }
      .choices{ grid-template-columns:1fr; }
      .choice{ min-height:82px; font-size:18px; }
      .topbar{ flex-direction:column; align-items:stretch; }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="sidebar">
      <a class="sidebar-icon" href="index.html"><i class="fas fa-home"></i></a>
      <a class="sidebar-icon" href="knowledge-base.html"><i class="fas fa-book"></i></a>
      <a class="sidebar-icon" href="learning-path.html"><i class="fas fa-graduation-cap"></i></a>
      <a class="sidebar-icon active" href="quiz.html"><i class="fas fa-clipboard-check"></i></a>
      <a class="sidebar-icon" href="share-experience.html"><i class="fas fa-comments"></i></a>
      <a class="sidebar-icon logout" href="#"><i class="fas fa-sign-out-alt"></i></a>
    </nav>

    <main class="main-content">
      <header class="header">
        <h1 id="pageHeaderTitle">Quiz</h1>
        <p class="subtitle">ตรวจสอบความเข้าใจในกระบวนการที่เรียนรู้</p>
      </header>

      <div class="page">
        <div class="topbar">
          <button class="back-btn" onclick="goBackToQuizPage()">← กลับหน้า Quiz</button>
          <div class="user-chip" id="userChip">กำลังตรวจสอบผู้ใช้...</div>
        </div>

        <div class="summary-strip">
          <div class="summary-pill">
            <div class="label">แบบทดสอบ</div>
            <div class="value" id="summaryQuizName">-</div>
          </div>
          <div class="summary-pill">
            <div class="label">ผู้ทำแบบทดสอบ</div>
            <div class="value" id="summaryUserName">-</div>
          </div>
          <div class="summary-pill">
            <div class="label">สถานะ</div>
            <div class="value" id="summaryStatus">กำลังทำแบบทดสอบ</div>
          </div>
        </div>

        <div class="layout quiz-active" id="quizLayout">
          <section class="card">
            <div id="mainArea" class="loading-state">กำลังโหลดคำถาม...</div>
          </section>

          <aside class="card hidden" id="reportSection">
            <h2 class="side-title">📊 สรุปผลการทำแบบทดสอบ</h2>
            <div class="score-box">
              <div class="stat">
                <div class="stat-label">ทำไปแล้ว</div>
                <div class="stat-value" id="answeredCount">0</div>
              </div>
              <div class="stat">
                <div class="stat-label">ถูก</div>
                <div class="stat-value" id="correctCount">0</div>
              </div>
              <div class="stat">
                <div class="stat-label">ผิด</div>
                <div class="stat-value" id="wrongCount">0</div>
              </div>
            </div>
            <div class="report-list" id="reportList">
              <div class="empty-state">ยังไม่มีคำตอบ</div>
            </div>
          </aside>
        </div>
      </div>

      <footer class="footer">
        <p>Knowledge Management System | ใช้ภายในองค์กรเท่านั้น</p>
      </footer>
    </main>
  </div>

  <script>
    const CONFIG = {
      API_URL: 'https://script.google.com/macros/s/AKfycbwMRbnqSLTmmI4wofmNfZ5YPFGSiqg__rZUgyDlTTR03JchnQXgUj7DKDvzS4-QBmJrvw/exec',
      RAW_BASE_URL: 'https://raw.githubusercontent.com/rangsimun255/KMS/main/assets/',
      QUIZ_PAGE_URL: 'quiz.html'
    };

    const SHAPES = {
      A: '▲',
      B: '●',
      C: '■',
      D: '◆'
    };

    const QUIZ_TITLES = {
      Quiz1: 'Quiz 1 - กระบวนการผสมเปียก',
      Quiz2: 'Quiz 2 - กระบวนการแร่งเปียก',
      Quiz3: 'Quiz 3 - กระบวนการอบลมร้อน',
      Quiz4: 'Quiz 4 - กระบวนการแร่งแห้ง',
      Quiz5: 'Quiz 5 - กระบวนการผสมแห้ง',
      Quiz6: 'Quiz 6 - กระบวนการตอกเม็ดยา',
      Quiz7: 'Quiz 7 - กระบวนการบรรจุซอง'
    };

    const state = {
      quizId: '',
      questions: [],
      currentIndex: 0,
      answers: [],
      user: null,
      isFinished: false
    };

    function getQuizIdFromURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get('quiz') || localStorage.getItem('selectedQuizId') || 'Quiz1';
    }

    function getLoggedInUser() {
      const raw =
        localStorage.getItem('kmsUser') ||
        sessionStorage.getItem('kmsUser') ||
        localStorage.getItem('currentUser') ||
        sessionStorage.getItem('currentUser');

      if (!raw) return null;

      try {
        const user = JSON.parse(raw);
        return {
          id: user.employeeId || user.id || 'unknown',
          employeeId: user.employeeId || user.id || 'unknown',
          name: user.name || 'Unknown User',
          role: user.role || '',
          department: user.department || '',
          status: user.status || ''
        };
      } catch (error) {
        return null;
      }
    }

    function updateUserChip() {
      const chip = document.getElementById('userChip');
      if (!state.user) {
        chip.textContent = 'ไม่พบข้อมูลผู้ใช้';
        return;
      }
      chip.textContent = `ผู้ทำแบบทดสอบ: ${state.user.name} (${state.user.employeeId})`;
    }

    function updatePageHeader() {
      const title = QUIZ_TITLES[state.quizId] || state.quizId;
      document.getElementById('pageHeaderTitle').textContent = title;
      document.getElementById('summaryQuizName').textContent = title;
      document.getElementById('summaryUserName').textContent = state.user?.name || '-';
    }

    function updateSummaryStatus(text) {
      document.getElementById('summaryStatus').textContent = text;
    }

    function goBackToQuizPage() {
      window.location.href = CONFIG.QUIZ_PAGE_URL;
    }

    function getPerformanceMeta(percent) {
      if (percent >= 90) {
        return {
          label: '⭐ ดีเยี่ยม',
          message: 'คุณมีความเข้าใจในกระบวนการนี้เป็นอย่างดี',
          badgeClass: 'correct'
        };
      }
      if (percent >= 70) {
        return {
          label: '⭐ ดี',
          message: 'คุณมีความเข้าใจในกระบวนการนี้ในระดับที่ดี',
          badgeClass: 'correct'
        };
      }
      if (percent >= 50) {
        return {
          label: '📝 พอใช้',
          message: 'คุณมีความเข้าใจพื้นฐาน แต่ควรทบทวนเพิ่มเติมบางจุด',
          badgeClass: 'wrong'
        };
      }
      return {
        label: '📘 ควรทบทวน',
        message: 'ควรกลับไปทบทวนเนื้อหาอีกครั้งก่อนทำซ้ำ',
        badgeClass: 'wrong'
      };
    }

    function showReportSection(show) {
      const reportSection = document.getElementById('reportSection');
      const quizLayout = document.getElementById('quizLayout');
      reportSection.classList.toggle('hidden', !show);
      quizLayout.classList.toggle('quiz-active', !show);
    }

    async function init() {
      state.quizId = getQuizIdFromURL();
      state.user = getLoggedInUser();
      updateUserChip();
      updatePageHeader();
      updateSummaryStatus('กำลังทำแบบทดสอบ');
      showReportSection(false);

      if (!CONFIG.API_URL) {
        renderError('ยังไม่ได้ใส่ API_URL ของ Apps Script');
        return;
      }

      if (!state.user) {
        renderError('ไม่พบข้อมูลผู้ใช้ที่ล็อกอิน');
        return;
      }

      try {
        const data = await fetchQuizQuestions(state.quizId);
        state.questions = Array.isArray(data)
          ? data.sort((a, b) => Number(a.QuestionID || 0) - Number(b.QuestionID || 0))
          : [];

        if (!state.questions.length) {
          renderError(`ไม่พบคำถามของ ${state.quizId}`);
          return;
        }

        renderQuestion();
        updateScorePanel();
        renderReport();
      } catch (error) {
        console.error(error);
        renderError('โหลดคำถามไม่สำเร็จ');
      }
    }

    async function fetchQuizQuestions(quizId) {
      const url = `${CONFIG.API_URL}?view=quiz&quizId=${encodeURIComponent(quizId)}`;
      const response = await fetch(url);
      const result = await response.json();

      if (!result.success) {
        throw new Error(result.message || 'โหลดคำถามไม่สำเร็จ');
      }

      return result.data || [];
    }

    async function postToAPI(payload) {
      const response = await fetch(CONFIG.API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify(payload)
      });
      return response.json();
    }

    function getCurrentQuestion() {
      return state.questions[state.currentIndex];
    }

    function getChoiceKeys(question) {
      return ['A', 'B', 'C', 'D'].filter(key => {
        const value = question[key];
        return value !== undefined && value !== null && String(value).trim() !== '';
      });
    }

    function getQuestionImageUrl(question) {
      if (!CONFIG.RAW_BASE_URL) return '';

      const quizNum = String(question.QuizID || '').replace('Quiz', '').trim();
      const qid = String(question.QuestionID || '').trim();

      if (!quizNum || !qid) return '';
      return `${CONFIG.RAW_BASE_URL}df${quizNum}.${qid}.jpg`;
    }

    function renderQuestion() {
      if (state.isFinished) {
        renderDone();
        return;
      }

      const question = getCurrentQuestion();
      const choices = getChoiceKeys(question);
      const progress = (state.currentIndex / state.questions.length) * 100;

      const main = document.getElementById('mainArea');
      main.className = '';
      main.innerHTML = `
        <div class="quiz-header">
          <div class="quiz-title-wrap">
            <h1>${escapeHTML(state.quizId)}</h1>
            <div class="quiz-meta">ข้อ ${state.currentIndex + 1} / ${state.questions.length}</div>
          </div>
        </div>

        <div class="progress-wrap">
          <div class="progress-label">
            <span>ความคืบหน้า</span>
            <span>${Math.round(progress)}%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-bar-fill" style="width:${progress}%"></div>
          </div>
        </div>

        <div class="question-block">
          <div class="question-number">Q${escapeHTML(question.QuestionID || String(state.currentIndex + 1))}</div>
          <p class="question-text">${escapeHTML(question.Question || '')}</p>
          <img id="questionImage" class="question-image" alt="ภาพคำถาม" />
          <div class="choices" id="choicesArea"></div>
        </div>

        <div class="action-row">
          <div class="feedback" id="feedbackText"></div>
          <button class="next-btn" id="nextBtn" disabled>ข้อต่อไป</button>
        </div>
      `;

      const img = document.getElementById('questionImage');
      const imageUrl = getQuestionImageUrl(question);
      if (imageUrl) {
        img.src = imageUrl;
        img.style.display = 'block';
        img.onerror = () => {
          img.style.display = 'none';
        };
      }

      const choicesArea = document.getElementById('choicesArea');
      choices.forEach(key => {
        const btn = document.createElement('button');
        btn.className = `choice ${key.toLowerCase()}`;
        btn.dataset.choice = key;
        btn.innerHTML = `
          <span class="shape">${SHAPES[key]}</span>
          <span>${escapeHTML(String(question[key]))}</span>
        `;
        btn.addEventListener('click', () => selectAnswer(key));
        choicesArea.appendChild(btn);
      });

      document.getElementById('nextBtn').addEventListener('click', goNext);
    }

    async function selectAnswer(choiceKey) {
      const question = getCurrentQuestion();
      const correctKey = String(question.Correct || '').trim().toUpperCase();
      const isCorrect = choiceKey === correctKey;
      const choiceButtons = Array.from(document.querySelectorAll('.choice'));

      choiceButtons.forEach(btn => {
        btn.disabled = true;
        const key = btn.dataset.choice;

        if (key === correctKey) btn.classList.add('correct-ring');
        if (key === choiceKey && !isCorrect) btn.classList.add('wrong-ring');
        if (key !== choiceKey && key !== correctKey) btn.classList.add('dim');
      });

      const answerRecord = {
        employeeId: state.user.employeeId,
        name: state.user.name,
        role: state.user.role,
        department: state.user.department,
        quizId: state.quizId,
        questionId: question.QuestionID || String(state.currentIndex + 1),
        question: question.Question || '',
        selected: choiceKey,
        selectedText: String(question[choiceKey] ?? ''),
        correct: correctKey,
        correctText: String(question[correctKey] ?? ''),
        isCorrect: isCorrect,
        timestamp: new Date().toISOString()
      };

      state.answers[state.currentIndex] = answerRecord;

      const feedback = document.getElementById('feedbackText');
      feedback.className = `feedback ${isCorrect ? 'correct' : 'wrong'}`;

      if (isCorrect) {
        feedback.textContent = '✅ ถูกต้อง! ไปต่อได้เลย';
      } else {
        feedback.textContent = `❌ ไม่ถูกต้อง | คำตอบที่ถูกคือ ${correctKey}. ${String(question[correctKey] ?? '')}`;
      }

      document.getElementById('nextBtn').disabled = false;
      updateScorePanel();

      try {
        await postToAPI({
          action: 'saveAnswer',
          payload: answerRecord
        });
      } catch (error) {
        console.warn('saveAnswer error', error);
      }
    }

    function goNext() {
      if (state.currentIndex < state.questions.length - 1) {
        state.currentIndex += 1;
        renderQuestion();
      } else {
        state.isFinished = true;
        renderDone();
      }
    }

    function updateScorePanel() {
      const answered = state.answers.filter(Boolean);
      const correct = answered.filter(item => item.isCorrect).length;
      const wrong = answered.filter(item => !item.isCorrect).length;

      document.getElementById('answeredCount').textContent = answered.length;
      document.getElementById('correctCount').textContent = correct;
      document.getElementById('wrongCount').textContent = wrong;
    }

    function renderReport() {
      const list = document.getElementById('reportList');
      const answered = state.answers.filter(Boolean);

      if (!answered.length) {
        list.innerHTML = '<div class="empty-state">ยังไม่มีคำตอบ</div>';
        return;
      }

      list.innerHTML = answered.map(item => `
        <div class="report-item">
          <div class="report-top">
            <div class="report-q">Q${escapeHTML(item.questionId)}</div>
            <div class="badge ${item.isCorrect ? 'correct' : 'wrong'}">${item.isCorrect ? 'ถูก' : 'ผิด'}</div>
          </div>
          <div class="report-answer">
            ตอบ: ${escapeHTML(item.selected)}. ${escapeHTML(item.selectedText)}<br>
            คำตอบที่ถูก: ${escapeHTML(item.correct)}. ${escapeHTML(item.correctText)}
          </div>
        </div>
      `).join('');
    }

    function scrollToReport() {
      showReportSection(true);
      renderReport();
      document.getElementById('reportSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function renderDone() {
      const total = state.questions.length;
      const correct = state.answers.filter(Boolean).filter(item => item.isCorrect).length;
      const percent = total ? Math.round((correct / total) * 100) : 0;
      const meta = getPerformanceMeta(percent);

      showReportSection(true);
      updateSummaryStatus('ทำแบบทดสอบเสร็จแล้ว');
      updateScorePanel();
      renderReport();

      const main = document.getElementById('mainArea');
      main.className = 'done-state';
      main.innerHTML = `
        <h1 class="done-title">🎉 ทำแบบทดสอบเสร็จแล้ว</h1>
        <div class="done-name">ชื่อ: ${escapeHTML(state.user?.name || 'Unknown User')}</div>
        <div class="done-score">${correct} / ${total}</div>
        <div class="done-percent">คะแนน: ${correct} / ${total} (${percent}%)</div>
        <div class="badge level ${meta.badgeClass}">ระดับ: ${meta.label}</div>
        <div class="done-message">${escapeHTML(meta.message)}</div>

        <div class="done-actions">
          <button class="review-btn" onclick="scrollToReport()">ดูเฉลย</button>
          <button class="restart-btn" onclick="restartQuiz()">ทำใหม่อีกครั้ง</button>
          <button class="return-btn" onclick="goBackToQuizPage()">กลับหน้า Quiz</button>
        </div>
      `;
    }

    function restartQuiz() {
      state.currentIndex = 0;
      state.answers = [];
      state.isFinished = false;
      updateSummaryStatus('กำลังทำแบบทดสอบ');
      showReportSection(false);
      renderQuestion();
      updateScorePanel();
      renderReport();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderError(message) {
      const main = document.getElementById('mainArea');
      main.className = 'error-state';
      main.innerHTML = `<div>${escapeHTML(message)}</div>`;
    }

    function escapeHTML(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    document.querySelector('.logout')?.addEventListener('click', function (e) {
      e.preventDefault();
      localStorage.removeItem('kmsUser');
      sessionStorage.removeItem('kmsUser');
      localStorage.removeItem('currentUser');
      sessionStorage.removeItem('currentUser');
      localStorage.removeItem('savedEmployeeId');
      window.location.href = 'login.html';
    });

    init();
  </script>
</body>
</html>
