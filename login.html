<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ - KMS</title>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
  font-family: 'Sarabun', sans-serif;
  min-height: 100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background: linear-gradient(135deg,#1a5276,#3498db);
}

.login-box {
  background:#fff;
  padding:30px;
  border-radius:16px;
  width:350px;
}

input {
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#3498db;
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

button:disabled {
  opacity:0.6;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Login</h2>

  <input type="text" id="employeeId" placeholder="รหัสพนักงาน">
  <input type="password" id="password" placeholder="รหัสผ่าน">

  <button id="btnLogin" onclick="handleLogin()">
    <i class="fas fa-sign-in-alt"></i> เข้าสู่ระบบ
  </button>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbz1SmAmMToaNZH4KAvNiIvCBf4WoU80G8fMcZzS_zhOiuWjjJHb41TZpdQSmiITiKZuSg/exec';

/* ✅ FIX 1: ปลดล็อกทุกครั้ง (กันค้าง) */
function forceUnlockLogin() {
    const btn = document.getElementById('btnLogin');
    const id = document.getElementById('employeeId');
    const pass = document.getElementById('password');

    btn.classList.remove('loading');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> เข้าสู่ระบบ';

    id.disabled = false;
    pass.disabled = false;
}

/* โหลดหน้า */
window.addEventListener('pageshow', forceUnlockLogin);
window.addEventListener('load', forceUnlockLogin);

/* ถ้ายัง login อยู่ให้เด้งออก */
window.onload = function () {
    const user =
        localStorage.getItem('currentUser') ||
        sessionStorage.getItem('currentUser');

    if (user) {
        window.location.href = 'index.html';
    }

    forceUnlockLogin();
};

function handleLogin() {
    const employeeId = document.getElementById('employeeId').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btnLogin');

    if (!employeeId || !password) {
        alert('กรอกข้อมูลให้ครบ');
        return;
    }

    /* กันกดซ้ำ + หมุน */
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังเข้าสู่ระบบ...';

    fetch(API_URL + '?action=login&employeeId=' + employeeId + '&password=' + password)
        .then(res => res.json())
        .then(data => {

            if (data.success) {
                localStorage.setItem('currentUser', JSON.stringify(data.user));
                window.location.href = 'index.html';
            } else {
                alert('รหัสไม่ถูกต้อง');
                resetButton();
            }

        })
        .catch(() => {
            alert('เชื่อมต่อไม่ได้');
            resetButton();
        });
}

/* รีเซ็ต */
function resetButton() {
    const btn = document.getElementById('btnLogin');

    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> เข้าสู่ระบบ';

    document.getElementById('employeeId').disabled = false;
    document.getElementById('password').disabled = false;

    document.getElementById('password').value = '';
}
</script>

</body>
</html>
