<!DOCTYPE html>
<html lang="th">
<head>
  <script>
    (function () {
      const user = localStorage.getItem('currentUser') || sessionStorage.getItem('currentUser');
      if (!user) {
        window.location.replace('login.html');
      }
    })();
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KMS - Quiz Play</title>

  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Sarabun',sans-serif;background:#F4F7FB;min-height:100vh;color:#2E3A59}
    .container{display:flex;min-height:100vh}

    .sidebar{
      width:70px;background:linear-gradient(180deg,#4A89C8 0%,#2E75B6 100%);
      display:flex;flex-direction:column;align-items:center;
      padding-top:20px;gap:10px;position:fixed;height:100vh;z-index:10;
    }
    .sidebar-icon{
      width:50px;height:50px;display:flex;align-items:center;justify-content:center;
      color:rgba(255,255,255,.85);font-size:20px;border-radius:12px;cursor:pointer;
      transition:all .3s ease;text-decoration:none;user-select:none;-webkit-tap-highlight-color:transparent;
    }
    .sidebar-icon:hover,.sidebar-icon.active{background:rgba(255,255,255,.18);color:#fff}
    .sidebar-icon:active{transform:scale(.96)}

    .main-content{flex:1;padding:0;margin-left:70px}

    .header{
      background:linear-gradient(135deg,#4A89C8 0%,#2E75B6 100%);
      padding:60px 40px;
      min-height:240px;
      text-align:center;
      box-shadow:0 4px 15px rgba(74,137,200,.25);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
    }
    .header h1{
      font-size:42px;
      font-weight:700;
      color:#fff;
      margin-bottom:15px;
      letter-spacing:1px;
      text-shadow:0 2px 4px rgba(0,0,0,.2);
    }
    .header .subtitle{
      font-size:18px;
      color:rgba(255,255,255,.95);
      max-width:820px;
      margin:0 auto;
      line-height:1.7;
    }

    .content{padding:22px 40px 30px 40px}

    .top-actions{
      display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:space-between;
      margin-bottom:14px;
    }
    .left-actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn{
      display:inline-flex;align-items:center;gap:10px;
      padding:10px 14px;border-radius:12px;text-decoration:none;font-weight:700;font-size:14px;
      background:#fff;color:#1F2D3D;box-shadow:0 4px 15px rgba(46,58,89,.06);
      border:2px solid transparent;transition:.2s ease;
    }
    .btn:hover{transform:translateY(-2px);border-color:#4A89C8}
    .btn i{color:#4A89C8}

    .play-box{
      background:#fff;border-radius:16px;padding:32px 24px;
      box-shadow:0 8px 25px rgba(46,58,89,.08);
      text-align:center;
    }

    .play-icon{
      width:84px;height:84px;border-radius:50%;
      margin:0 auto 18px auto;
      display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#E6F0FA 0%,#D4E9F7 100%);
      color:#2E75B6;font-size:34px;
    }

    .play-box h2{
      font-size:28px;
      color:#1F2D3D;
      margin-bottom:10px;
    }

    .play-box p{
      font-size:15px;
      line-height:1.8;
      color:#5B6780;
      max-width:760px;
      margin:0 auto 12px auto;
    }

    .quiz-link{
      margin-top:18px;
      display:inline-flex;align-items:center;justify-content:center;gap:10px;
      padding:14px 20px;border-radius:14px;text-decoration:none;font-weight:700;font-size:15px;color:#fff;
      background:linear-gradient(135deg,#4A89C8 0%,#2E75B6 100%);
      box-shadow:0 10px 20px rgba(46,58,89,.10);
      transition:all .2s ease;
    }
    .quiz-link:hover{transform:translateY(-2px);filter:brightness(1.02)}

    .note{
      margin-top:16px;
      font-size:14px;
      color:#7A869A;
    }

    .error{
      background:#fff;border-radius:16px;padding:18px 20px;
      box-shadow:0 8px 25px rgba(46,58,89,.08);
      color:#b91c1c;line-height:1.7
    }

    .footer{text-align:center;padding:15px 40px;color:#95a5a6;font-size:13px}

    @media (max-width:768px){
      .sidebar{
        width:100%;
        height:60px;
        flex-direction:row;
        justify-content:center;
        padding:10px;
        position:fixed;
        top:0;
        z-index:1000;
      }

      .main-content{
        margin-left:0;
        margin-top:60px;
      }

      .header{padding:40px 20px;min-height:170px}
      .header h1{font-size:28px}
      .header .subtitle{font-size:15px}

      .content{padding:18px}
      .play-box h2{font-size:22px}
    }
  </style>
</head>

<body>
  <div class="container">
    <nav class="sidebar">
      <a class="sidebar-icon" href="index.html"><i class="fas fa-home"></i></a>
      <a class="sidebar-icon" href="knowledge-base.html"><i class="fas fa-book"></i></a>
      <a class="sidebar-icon" href="learning-path.html"><i class="fas fa-graduation-cap"></i></a>
      <a class="sidebar-icon active" href="quiz.html"><i class="fas fa-clipboard-check"></i></a>
      <a class="sidebar-icon" href="share-experience.html"><i class="fas fa-comments"></i></a>
      <a class="sidebar-icon logout" href="#"><i class="fas fa-sign-out-alt"></i></a>
    </nav>

    <main class="main-content">
      <header class="header">
        <h1 id="pageTitle">Quiz</h1>
        <p class="subtitle">
          แบบทดสอบนี้จะเปิดผ่าน Kahoot ในแท็บใหม่<br>
          * ก่อนเริ่มอย่าลืมกรอก <b>ชื่อ/รหัสพนักงาน</b> ใน Kahoot
        </p>
      </header>

      <section class="content">
        <div class="top-actions">
          <div class="left-actions">
            <a class="btn" href="quiz.html"><i class="fas fa-arrow-left"></i> กลับหน้า Quiz</a>
            <a class="btn" href="learning-path.html"><i class="fas fa-graduation-cap"></i> Learning Path</a>
          </div>
        </div>

        <div id="contentBox"></div>
      </section>

      <footer class="footer">
        <p>Knowledge Management System | ใช้ภายในองค์กรเท่านั้น</p>
      </footer>
    </main>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const kahootId = params.get("k");
    const title = params.get("title") || "Quiz";

    document.getElementById("pageTitle").innerText = title;

    const contentBox = document.getElementById("contentBox");

    if (!kahootId || kahootId.startsWith("KAHOOT_ID_")) {
      contentBox.innerHTML = `
        <div class="error">
          <b>ยังไม่พบ Kahoot ID</b><br>
          กรุณากลับไปหน้า Quiz แล้วใส่ Kahoot ID ให้ครบทั้ง 7 ชุด
        </div>
      `;
    } else {
      const challengeUrl = "https://kahoot.it/challenge/" + encodeURIComponent(kahootId);

      contentBox.innerHTML = `
        <div class="play-box">
          <div class="play-icon"><i class="fas fa-play"></i></div>
          <h2>${title}</h2>
          <p>
            เนื่องจาก Kahoot บางชุดไม่รองรับการฝังในหน้าเว็บ ระบบจึงเปิดแบบทดสอบผ่านลิงก์โดยตรงแทน
          </p>
          <p>
            กดปุ่มด้านล่างเพื่อเริ่มทำแบบทดสอบได้เลย
          </p>
          <a class="quiz-link" href="${challengeUrl}" target="_blank" rel="noopener noreferrer">
            <i class="fas fa-arrow-up-right-from-square"></i> เปิด Quiz ใน Kahoot
          </a>
          <div class="note">
            หากกดแล้วไม่เปิด ให้ตรวจสอบว่า Kahoot ID ถูกต้องหรือยัง
          </div>
        </div>
      `;
    }
  </script>

  <script src="Js"></script>
</body>
</html>
