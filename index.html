<!DOCTYPE html>
<html lang="th">
<head>
  <script>
    (function () {
      const user = localStorage.getItem('currentUser') || sessionStorage.getItem('currentUser');
      if (!user) {
        window.location.replace('login.html');
      }
    })();
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KMS - Knowledge Management System</title>

  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { 
      font-family: 'Sarabun', sans-serif; 
      background-color: #f7fafc;
      min-height: 100vh; 
      color: #1f2d3d;
      font-size: 14px;
      line-height: 1.7;
    }

    .container { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 70px;
      background: linear-gradient(180deg, #0172b4 0%, #015a91 100%);
      display: flex; flex-direction: column; align-items: center;
      padding-top: 20px; gap: 10px;
      position: fixed; height: 100vh;
      z-index: 10;
    }

    .sidebar-icon {
      width: 50px; height: 50px;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.85);
      font-size: 20px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .sidebar-icon:hover,
    .sidebar-icon.active {
      background-color: rgba(245,223,78,0.25);
      color: #fff;
    }

    .main-content { flex: 1; margin-left: 70px; }

    /* HEADER */
    .header {
      background: linear-gradient(135deg, #0172b4 0%, #a1dba9 100%);
      padding: 60px 40px;
      text-align: center;
      box-shadow: 0 6px 20px rgba(1,114,180,0.25);
    }

    .header h1 {
      font-size: 42px; 
      font-weight: 700; 
      color: #ffffff;
      margin-bottom: 15px;
    }

    .header .subtitle {
      font-size: 18px; 
      color: rgba(255,255,255,0.95);
    }

    /* Cards */
    .menu-cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      padding: 30px 40px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      border: 1px solid #eef3f8;
      transition: all 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: #fdac53;
      box-shadow: 0 10px 30px rgba(253,172,83,0.25);
    }

    .card-icon {
      width: 60px; height: 60px;
      margin: 0 auto 15px;
      background: linear-gradient(135deg, #f5df4e 0%, #fdac53 100%);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; 
      color: #ffffff;
    }

    .card-title { 
      font-size: 18px; 
      font-weight: 600; 
      margin-bottom: 8px; 
    }

    .card-desc { 
      font-size: 14px; 
      color: #6b7a90;
    }

    /* New Employee */
    .new-employee {
      background: #ffffff;
      border-radius: 16px;
      padding: 22px 28px;
      margin: 0 40px 20px 40px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      border-left: 6px solid #a1dba9;
    }

    .new-employee h3 i { 
      color: #0172b4;
    }

    strong { 
      color: #fdac53; 
    }

    .footer { 
      text-align: center; 
      padding: 15px;
      color: #8a98ad;
    }

    @media (max-width: 768px) {
      .menu-cards { grid-template-columns: 1fr; }
      .main-content { margin-left: 0; }
    }
  </style>
</head>

<body>
  <div class="container">
    <nav class="sidebar">
      <a class="sidebar-icon" href="#"><i class="fas fa-home"></i></a>
      <a class="sidebar-icon" href="#"><i class="fas fa-book"></i></a>
      <a class="sidebar-icon" href="#"><i class="fas fa-graduation-cap"></i></a>
      <a class="sidebar-icon" href="#"><i class="fas fa-clipboard-check"></i></a>
      <a class="sidebar-icon" href="#"><i class="fas fa-comments"></i></a>
    </nav>

    <main class="main-content">
      <header class="header">
        <h1>Knowledge Management System</h1>
        <p class="subtitle">ศูนย์รวมความรู้ เทคนิค และจุดสำคัญในการผลิต</p>
      </header>

      <section class="menu-cards">
        <div class="card">
          <div class="card-icon"><i class="fas fa-book-open"></i></div>
          <h2 class="card-title">Knowledge Base</h2>
          <p class="card-desc">ค้นหาความรู้</p>
        </div>

        <div class="card">
          <div class="card-icon"><i class="fas fa-graduation-cap"></i></div>
          <h2 class="card-title">Learning Path</h2>
          <p class="card-desc">เรียนรู้กระบวนการ</p>
        </div>
      </section>

      <section class="new-employee">
        <h3><i class="fas fa-user-plus"></i> สำหรับพนักงานใหม่</h3>
        <ol>
          <li>เข้า <strong>Learning Path</strong></li>
          <li>เลือกกระบวนการ</li>
        </ol>
      </section>

      <footer class="footer">
        <p>Knowledge Management System</p>
      </footer>
    </main>
  </div>
</body>
</html>
