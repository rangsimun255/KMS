<!DOCTYPE html>
<html lang="th">
<head>
  <script>
    (function () {
      const user = localStorage.getItem('currentUser') || sessionStorage.getItem('currentUser');
      if (!user) {
        window.location.replace('login.html');
      }
    })();
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KMS - Knowledge Management System</title>

  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { 
      font-family: 'Sarabun', sans-serif; 
      background-color: #F4F7FB; 
      min-height: 100vh; 
      color: #2E3A59;
      font-size: 14px;
      line-height: 1.7;
    }

    .container { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 70px;
      background: linear-gradient(180deg, #00796B 0%, #0172B4 100%);
      display: flex; flex-direction: column; align-items: center;
      padding-top: 20px; gap: 10px;
      position: fixed; height: 100vh;
      z-index: 10;
    }

    .sidebar-icon {
      width: 50px; height: 50px;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.85);
      font-size: 20px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .sidebar-icon:hover,
    .sidebar-icon.active {
      background-color: rgba(255,255,255,0.18);
      color: #fff;
    }

    .sidebar-icon:active { transform: scale(0.96); }

    .main-content { flex: 1; padding: 0; margin-left: 70px; }

    /* HEADER */
    .header {
      background: linear-gradient(135deg, #00796B 0%, #00A896 100%);
      padding: 60px 40px;
      min-height: 240px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,121,107,0.25);

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .header h1 {
      font-size: 42px; 
      font-weight: 700; 
      color: #ffffff;
      margin-bottom: 15px;
      letter-spacing: 1px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }

    .header .subtitle {
      font-size: 18px; 
      color: rgba(255, 255, 255, 0.95);
      max-width: 650px; 
      margin: 0 auto; 
      line-height: 1.7;
    }

    /* Cards */
    .menu-cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      padding: 30px 40px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(46,58,89,0.08);
      transition: all 0.3s ease;
      border: 2px solid transparent;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0,121,107,0.18);
      border-color: #00A896;
    }

    .card-icon {
      width: 60px; height: 60px;
      margin: 0 auto 15px;
      background: linear-gradient(135deg, #E6F7F3 0%, #D4F1EA 100%);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; 
      color: #00796B;
    }

    .card-title { 
      font-size: 18px; 
      font-weight: 600; 
      color: #2E3A59; 
      margin-bottom: 8px; 
    }

    .card-desc { 
      font-size: 14px; 
      color: #6B7A90; 
      line-height: 1.5; 
    }

    .new-employee {
      background: #ffffff;
      border-radius: 16px;
      padding: 22px 28px;
      margin: 0 40px 20px 40px;
      box-shadow: 0 4px 15px rgba(46,58,89,0.08);
      border-left: 6px solid #00796B;
    }

    .new-employee h3 i { 
      color: #0172B4;
    }

    .new-employee strong { 
      color: #FDAC53; 
    }

    .footer { 
      text-align: center; 
      padding: 15px 40px; 
      color: #8A98AD; 
      font-size: 13px; 
    }

    @media (max-width: 768px) {
      .container { flex-direction: column; }
      .sidebar {
        width: 100%;
        height: 60px;
        flex-direction: row;
        justify-content: center;
        padding: 10px;
        position: sticky;
        top: 0;
      }
      .main-content { margin-left: 0; }
      .menu-cards { grid-template-columns: 1fr; padding: 20px; }
      .new-employee { margin: 0 20px 20px 20px; }

      .header { padding: 40px 20px; min-height: 170px; }
      .header h1 { font-size: 28px; }
      .header .subtitle { font-size: 15px; }
    }
  </style>
</head>

<body>
  <!-- (ส่วน body เหมือนเดิมทุกอย่าง ไม่แตะเลย) -->
