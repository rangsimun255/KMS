<!DOCTYPE html>
<html lang="th">
<head>
  <script>
    (function () {
      const user = localStorage.getItem('currentUser') || sessionStorage.getItem('currentUser');
      if (!user) {
        window.location.replace('login.html');
      }
    })();
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KMS - Knowledge Management System</title>

  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { 
      font-family: 'Sarabun', sans-serif; 
      background-color: #F4F7F6; 
      min-height: 100vh; 
      color: #2F3E46;
      font-size: 14px;
      line-height: 1.7;
    }

    .container { display: flex; min-height: 100vh; }

    /* Sidebar (โทนเขียวเข้มแบบในรูป) */
    .sidebar {
      width: 70px;
      background: linear-gradient(180deg, #0E6B63 0%, #0B5E57 100%);
      display: flex; flex-direction: column; align-items: center;
      padding-top: 20px; gap: 10px;
      position: fixed; height: 100vh;
      z-index: 10;
    }

    .sidebar-icon {
      width: 50px; height: 50px;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.9);
      font-size: 20px;
      border-radius: 12px;
    }

    .sidebar-icon:hover {
      background-color: rgba(255,255,255,0.15);
    }

    .main-content { flex: 1; margin-left: 70px; }

    /* HEADER (ขนาดเดิม แต่เปลี่ยน style ให้เหมือนรูป) */
    .header {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #EEF7F1 0%, #E6F4EC 100%);
      padding: 60px 40px;
      min-height: 240px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    /* wave ด้านบน */
    .header::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(1000px 180px at 20% -20%, rgba(102,179,153,0.35) 0%, transparent 60%),
        radial-gradient(900px 200px at 90% 120%, rgba(102,179,153,0.25) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ลายเส้นมุม */
    .header::after {
      content: "";
      position: absolute;
      right: 0;
      bottom: 0;
      width: 280px;
      height: 100px;
      background: repeating-linear-gradient(
        -25deg,
        rgba(102,179,153,0.15),
        rgba(102,179,153,0.15) 1px,
        transparent 1px,
        transparent 8px
      );
      opacity: 0.5;
    }

    /* dot pattern */
    .header .dots {
      position: absolute;
      left: 100px;
      top: 70px;
      width: 80px;
      height: 80px;
      background-image: radial-gradient(circle, rgba(102,179,153,0.5) 1.5px, transparent 1.5px);
      background-size: 12px 12px;
      opacity: 0.5;
    }

    /* hexagon */
    .header .hex {
      position: absolute;
      right: 100px;
      top: 40px;
      width: 100px;
      height: 60px;
      opacity: 0.4;
      background:
        radial-gradient(circle, rgba(102,179,153,0.4) 2px, transparent 2px);
      background-size: 20px 20px;
    }

    /* leaf */
    .header .leaf {
      position: absolute;
      right: 80px;
      bottom: 20px;
      width: 60px;
      height: 100px;
      opacity: 0.5;
    }

    .header .leaf::before,
    .header .leaf::after {
      content: "";
      position: absolute;
      width: 20px;
      height: 10px;
      background: rgba(102,179,153,0.6);
      border-radius: 100% 0 100% 0;
    }

    .header .leaf::before { top: 30px; left: 10px; transform: rotate(30deg); }
    .header .leaf::after { top: 50px; left: 20px; transform: rotate(60deg); }

    .header h1 {
      font-size: 42px;
      font-weight: 700;
      color: #0E6B63;
      margin-bottom: 15px;
    }

    .header .subtitle {
      font-size: 18px;
      color: #5B6E7F;
    }

    /* cards */
    .menu-cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      padding: 30px 40px;
    }

    .card {
      position: relative;
      overflow: hidden;
      background: #ffffff;
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    /* dot pattern */
    .card::before {
      content: "";
      position: absolute;
      left: 20px;
      top: 20px;
      width: 70px;
      height: 70px;
      background-image: radial-gradient(circle, rgba(102,179,153,0.3) 1.5px, transparent 1.5px);
      background-size: 12px 12px;
    }

    /* wave */
    .card::after {
      content: "";
      position: absolute;
      right: -20px;
      bottom: -20px;
      width: 150px;
      height: 100px;
      background: radial-gradient(ellipse at bottom right, rgba(102,179,153,0.2), transparent 60%);
    }

    .card-icon {
      width: 60px; height: 60px;
      margin: 0 auto 15px;
      background: #E8F4EE;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      color: #0E6B63;
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      color: #2F3E46;
    }

    .card-desc {
      font-size: 14px;
      color: #6B7A90;
    }

    .new-employee {
      background: #ffffff;
      border-radius: 16px;
      padding: 22px 28px;
      margin: 0 40px 20px 40px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      border-left: 6px solid #0E6B63;
    }

    .new-employee h3 i {
      color: #0E6B63;
    }

    .new-employee strong {
      color: #0E6B63;
    }

    .footer {
      text-align: center;
      padding: 15px 40px;
      color: #8A98AD;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div class="container">
    <nav class="sidebar">
      <a class="sidebar-icon"><i class="fas fa-home"></i></a>
      <a class="sidebar-icon"><i class="fas fa-book"></i></a>
      <a class="sidebar-icon"><i class="fas fa-graduation-cap"></i></a>
      <a class="sidebar-icon"><i class="fas fa-clipboard-check"></i></a>
      <a class="sidebar-icon"><i class="fas fa-comments"></i></a>
      <a class="sidebar-icon"><i class="fas fa-sign-out-alt"></i></a>
    </nav>

    <main class="main-content">
      <header class="header">
        <div class="dots"></div>
        <div class="hex"></div>
        <div class="leaf"></div>

        <h1>Knowledge Management System</h1>
        <p class="subtitle">ศูนย์รวมความรู้ เทคนิค และจุดสำคัญในการผลิต</p>
      </header>

      <section class="menu-cards">
        <div class="card">
          <div class="card-icon"><i class="fas fa-book-open"></i></div>
          <h2 class="card-title">Knowledge Base</h2>
          <p class="card-desc">ค้นหาความรู้ เทคนิค และวิธีแก้ปัญหา</p>
        </div>

        <div class="card">
          <div class="card-icon"><i class="fas fa-graduation-cap"></i></div>
          <h2 class="card-title">Learning Path</h2>
          <p class="card-desc">เรียนรู้กระบวนการผลิตและจุดสำคัญ</p>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
