<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Defect Learning - KMS</title>

  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    :root{
      --blue1:#4A89C8;
      --blue2:#2E75B6;
      --bg:#F4F7FB;
      --text:#2E3A59;
      --muted:#6B7A90;
      --card:#ffffff;
      --line:#EEF3F8;
      --soft:#F7FBFF;
      --soft-line:#E8F1FB;
    }

    body{
      font-family:'Sarabun',sans-serif;
      background:var(--bg);
      min-height:100vh;
      color:var(--text);
    }

    .container{display:flex;min-height:100vh}

    .sidebar{
      width:70px;
      background:linear-gradient(180deg,var(--blue1),var(--blue2));
      display:flex;flex-direction:column;align-items:center;
      padding-top:20px;gap:10px;
      position:fixed;height:100vh;
    }

    .sidebar-icon{
      width:50px;height:50px;
      display:flex;align-items:center;justify-content:center;
      color:#fff;font-size:20px;border-radius:12px;
    }

    .main-content{margin-left:70px;width:100%}

    .header{
      background:linear-gradient(135deg,var(--blue1),var(--blue2));
      padding:50px;text-align:center;color:#fff;
    }

    .wrap{padding:16px}

    .card{
      background:#fff;
      border-radius:16px;
      padding:16px;
      box-shadow:0 4px 12px rgba(0,0,0,.08);
    }

    .img-box{
      height:260px;
      background:#f5f7fa;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:12px;
    }

    .box{
      background:#F7FBFF;
      border-radius:14px;
      padding:12px;
      margin-top:10px;
    }

    .label{
      font-weight:700;
      margin-bottom:6px;
      color:var(--blue2);
    }

    /* 🔥 NEW ACTION CARD */
    .action-card{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .action-btn{
      width:44px;
      height:44px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:12px;
      background:var(--blue1);
      color:#fff;
      text-decoration:none;
      font-size:18px;
    }

    .action-btn:hover{
      background:var(--blue2);
    }

    .action-content{
      display:flex;
      flex-direction:column;
    }

    .action-title{
      font-weight:700;
    }

    .action-desc{
      font-size:13px;
      color:#6B7A90;
    }

  </style>
</head>

<body>
<div class="container">

<nav class="sidebar">
  <div class="sidebar-icon"><i class="fas fa-home"></i></div>
</nav>

<main class="main-content">
  <div class="header">
    <h1>Defect Learning</h1>
  </div>

  <div class="wrap">
    <div id="content">Loading...</div>
  </div>
</main>

</div>

<script>

const API_URL = "YOUR_API";

let defects = [];
let index = 0;

function extractUrl(text){
  const match = String(text||"").match(/https?:\/\/[^\s]+/);
  return match ? match[0] : "";
}

function renderNextAction(url){
  return `
    <div class="action-card">
      
      <!-- 🔥 ปุ่มซ้าย -->
      <a class="action-btn" href="${url}" target="_blank">
        <i class="fas fa-play"></i>
      </a>

      <!-- 🔥 ข้อความ -->
      <div class="action-content">
        <div class="action-title">ตัวอย่างลักษณะของเสีย</div>
        <div class="action-desc">กดเพื่อดูวิดีโอ</div>
      </div>

    </div>
  `;
}

function render(){
  const d = defects[index];
  const url = extractUrl(d.NextAction);

  document.getElementById("content").innerHTML = `
    <div class="card">

      <div class="img-box">
        <img src="assets/df${d.DefectCode}.jpg" style="max-height:100%">
      </div>

      <div class="box">
        <div class="label">ลักษณะของของเสีย</div>
        ${d.DefectSummary || "-"}
      </div>

      ${url ? `
      <div class="box">
        <div class="label">Next Action</div>
        ${renderNextAction(url)}
      </div>
      ` : ``}

    </div>
  `;
}

async function load(){
  const res = await fetch(API_URL);
  defects = await res.json();
  render();
}

load();

</script>
</body>
</html>
